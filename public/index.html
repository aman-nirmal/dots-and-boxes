<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dots & Boxes | Auto-Save</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="landing-screen" class="panel active">
            <h1>Dots & Boxes</h1>
            <div class="card">
                <h3>Your Details</h3>
                <input type="text" id="player-name" placeholder="Enter Your Name" value="Player">
                
                <div class="palette-container">
                    <label>Choose Ink Color:</label>
                    <div id="player-palette" class="palette"></div>
                    <input type="hidden" id="player-color" value="#3b82f6">
                </div>
                
                <div class="size-selector">
                    <label>Grid Size (Host Only):</label>
                    <select id="board-size">
                        <option value="6">Quick (5x5 Boxes)</option>
                        <option value="10" selected>Classic (9x9 Boxes)</option>
                        <option value="15">Epic (14x14 Boxes)</option>
                    </select>
                </div>
                <div class="action-divider"><span>PLAY</span></div>
                <div class="action-buttons">
                    <button id="host-btn" class="primary-btn w-full">Create New Room</button>
                    <div class="join-section">
                        <input type="text" id="room-input" placeholder="ROOM CODE" maxlength="6">
                        <button id="join-btn" class="secondary-btn">Join Room</button>
                    </div>
                </div>
            </div>
            <p id="error-msg" style="color: red; margin-top: 10px; font-weight: bold;"></p>
        </div>

        <div id="lobby-screen" class="panel hidden">
            <h2>Room Code: <br><span class="code-display" id="room-code-display">------</span></h2>
            <div class="card">
                <h3>Players (<span id="player-count">1</span>/4)</h3>
                <ul id="lobby-player-list" class="player-list"></ul>
                <p id="waiting-msg" class="waiting-text">Waiting for host to start...</p>
                <button id="start-game-btn" class="primary-btn hidden w-full">Start Game</button>
            </div>
        </div>

        <div id="game-screen" class="panel hidden game-layout">
            <div class="game-core">
                
                <div class="timer-display" id="timer-display">
                    <span id="turn-display">Waiting...</span>
                    <div class="time-left" id="time-left">15s</div>
                </div>

                <div class="scoreboard" id="dynamic-scoreboard"></div>
                
                <div class="board-wrapper">
                    <div class="board-container"></div>
                    <div id="game-over-modal" class="modal hidden">
                        <h2 id="winner-text">Player Wins!</h2>
                        <div id="final-scores-list" class="final-scores"></div>
                        <button id="rematch-btn" class="primary-btn">Back to Lobby</button>
                        <button id="leave-btn" class="secondary-btn" style="margin-top:10px;">Leave Room</button>
                    </div>
                </div>
            </div>

            <div class="chat-container">
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Type a message...">
                    <button id="chat-send">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
