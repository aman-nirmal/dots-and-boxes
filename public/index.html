<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dots & Boxes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
     <div class="container">
        <div id="landing-screen" class="panel active">
            <h1>Dots & Boxes</h1>
            <div class="card">
                <h3>Your Details</h3>
                <input type="text" id="player-name" placeholder="Enter Your Name" value="Player">
                <div class="palette-container">
                    <label>Choose Ink Color:</label>
                    <div id="player-palette" class="palette"></div>
                    <input type="hidden" id="player-color" value="#3b82f6">
                </div>
                <div class="size-selector">
                    <label>Grid Size (Host Only):</label>
                    <select id="board-size">
                        <option value="6">Quick (5x5 Boxes)</option>
                        <option value="10" selected>Classic (9x9 Boxes)</option>
                        <option value="15">Epic (14x14 Boxes)</option>
                    </select>
                </div>
                <div class="action-divider"><span>PLAY</span></div>
                <div class="action-buttons">
                    <button id="host-btn" class="primary-btn w-full">Create New Room</button>
                    <div class="join-section">
                        <input type="text" id="room-input" placeholder="ROOM CODE" maxlength="6">
                        <button id="join-btn" class="secondary-btn">Join Room</button>
                    </div>
                </div>
            </div>
            <p id="error-msg" class="error-text"></p>
        </div>

        <div id="lobby-screen" class="panel hidden">
            <h2>Room Code: <br><span class="code-display" id="room-code-display">------</span></h2>
            <div class="card">
                <h3>Players (<span id="player-count">1</span>/4)</h3>
                <ul id="lobby-player-list" class="player-list"></ul>
                <p id="waiting-msg" class="waiting-text">Waiting for host to start...</p>
                <button id="start-game-btn" class="primary-btn hidden w-full">Start Game</button>
                <button id="leave-lobby-btn" class="secondary-btn w-full" style="margin-top: 10px;">Leave Lobby</button>
            </div>
        </div>

        <div id="game-screen" class="panel hidden">
            <div class="game-header">
                <button id="leave-game-btn" class="secondary-btn exit-btn">Exit</button>
            </div>

            <div class="scoreboard">
                <div class="side-scores left-scores">
                    <div class="score-card p-0" id="card-p0">
                        <span id="name-p0" class="name">P1</span>
                        <span id="score-p0" class="score">0</span>
                    </div>
                    <div class="score-card p-2 hidden" id="card-p2">
                        <span id="name-p2" class="name">P3</span>
                        <span id="score-p2" class="score">0</span>
                    </div>
                </div>

                <div class="turn-indicator">
                    <span id="turn-display">Waiting...</span>
                    <div id="timer-display" style="color: #ef4444; font-size: 1.5rem; margin-top: 5px;">15s</div>
                </div>

                <div class="side-scores right-scores">
                    <div class="score-card p-1" id="card-p1">
                        <span id="score-p1" class="score">0</span>
                        <span id="name-p1" class="name">P2</span>
                    </div>
                    <div class="score-card p-3 hidden" id="card-p3">
                        <span id="score-p3" class="score">0</span>
                        <span id="name-p3" class="name">P4</span>
                    </div>
                </div>
            </div>
            
            <div class="board-wrapper">
                <div class="board-container"></div>
                <div id="game-over-modal" class="modal hidden">
                    <h2 id="winner-text">Player Wins!</h2>
                    <div id="final-scores-list" class="final-scores"></div>
                    <button id="rematch-btn" class="primary-btn w-full" style="margin-bottom:10px;">Play Again</button>
                    <button id="leave-modal-btn" class="secondary-btn w-full">Leave Room</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
