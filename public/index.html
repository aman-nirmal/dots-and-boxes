<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dots & Boxes | Pen & Paper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="landing-screen" class="panel active">
            <h1>Dots & Boxes</h1>
            
            <div class="card">
                <h3>Your Details</h3>
                <input type="text" id="player-name" placeholder="Enter Your Name" value="Player">
                
                <div class="palette-container">
                    <label>Choose Ink Color:</label>
                    <div id="player-palette" class="palette"></div>
                    <input type="hidden" id="player-color" value="#3b82f6">
                </div>

                <div class="action-divider"><span>PLAY</span></div>

                <div class="action-buttons">
                    <button id="host-btn" class="primary-btn w-full">Create New Room</button>
                    
                    <div class="join-section">
                        <input type="text" id="room-input" placeholder="ROOM CODE" maxlength="6">
                        <button id="join-btn" class="secondary-btn">Join Room</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="lobby-screen" class="panel hidden">
            <h2>Waiting for Opponent...</h2>
            <p>Share this code with your friend:</p>
            <div class="code-display" id="room-code-display">------</div>
        </div>

        <div id="game-screen" class="panel hidden">
            <div class="scoreboard">
                <div class="score-card player-1">
                    <span id="p1-name-display" class="name">P1</span>
                    <span id="p1-score" class="score">0</span>
                </div>
                <div class="turn-indicator" id="turn-display">Waiting...</div>
                <div class="score-card player-2">
                    <span id="p2-score" class="score">0</span>
                    <span id="p2-name-display" class="name">P2</span>
                </div>
            </div>
            <div class="board-wrapper">
                <div class="board-container"></div>
                
                <div id="game-over-modal" class="modal hidden">
                    <h2 id="winner-text">Player Wins!</h2>
                    <div class="final-scores">
                        <p id="final-p1">P1: 0</p>
                        <p id="final-p2">P2: 0</p>
                    </div>
                    <button id="rematch-btn" class="primary-btn">Play Again</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
